name: daily-paper-reader

on:
  schedule:
    - cron: "35 18 * * *"
  workflow_dispatch:
    inputs:
      run_enrich:
        description: "Run query enrichment before the pipeline"
        required: false
        default: "false"
      fetch_days:
        description: "Lookback days; empty uses scheduled default"
        required: false
        default: "10"
      fetch_mode:
        description: "Fetch mode: auto, standard, or skims"
        required: false
        default: "auto"
      profile_tag:
        description: "Run one profile tag; empty runs all matrix shards"
        required: false
        default: ""
      run_date_token:
        description: "Optional explicit date window: YYYYMMDD or YYYYMMDD-YYYYMMDD"
        required: false
        default: ""
      recall_top_k:
        description: "Optional recall top-k per query for lighter backfill"
        required: false
        default: ""
      rrf_top_n:
        description: "Optional RRF top-n before LLM filtering"
        required: false
        default: ""
      skip_llm_refine:
        description: "Skip Step 4 model filtering and use retrieval fallback scores"
        required: false
        default: "false"
      force_deep:
        description: "Force all selected recommendations into deep_dive"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  run:
    name: run (${{ matrix.profile_tag || 'ALL' }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        profile_tag: ${{ fromJson(github.event_name == 'workflow_dispatch' && github.event.inputs.profile_tag != '' && format('["{0}"]', github.event.inputs.profile_tag) || '[""]') }}
    concurrency:
      group: daily-paper-reader-${{ github.ref }}-${{ matrix.profile_tag }}
      cancel-in-progress: false
    env:
      BLT_API_KEY: ${{ secrets.BLT_API_KEY }}
      BLT_REWRITE_MODEL: qwen3.6-plus
      BLT_RERANK_MODEL: qwen3-reranker-4b
      BLT_FILTER_MODEL: qwen3.7-max
      DPR_EMBED_API_TIMEOUT: "60"
      LLM_PRIMARY_BASE_URL: ${{ secrets.LLM_PRIMARY_BASE_URL }}
      BLT_PRIMARY_BASE_URL: ${{ secrets.BLT_PRIMARY_BASE_URL }}
      BLT_API_BASE: ${{ secrets.BLT_PRIMARY_BASE_URL }}
      SUMMARY_API_KEY: ${{ secrets.SUMMARY_API_KEY }}
      SUMMARY_BASE_URL: ${{ secrets.SUMMARY_BASE_URL }}
      SUMMARY_MODEL: qwen3.7-max
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Decide profile shard
        run: |
          REQUESTED_PROFILE="${{ github.event.inputs.profile_tag }}"
          MATRIX_PROFILE="${{ matrix.profile_tag }}"
          if [ -n "$REQUESTED_PROFILE" ] && [ "$REQUESTED_PROFILE" != "$MATRIX_PROFILE" ]; then
            echo "SHOULD_RUN=false" >> "$GITHUB_ENV"
            echo "Skipping profile shard ${MATRIX_PROFILE}; requested ${REQUESTED_PROFILE}."
          else
            echo "SHOULD_RUN=true" >> "$GITHUB_ENV"
            echo "Running profile shard ${MATRIX_PROFILE}."
          fi
      - name: Checkout
        if: env.SHOULD_RUN == 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        if: env.SHOULD_RUN == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Java
        if: env.SHOULD_RUN == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Python deps
        if: env.SHOULD_RUN == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
            ~/.cache/torch
            ~/.cache/dpr-tools/pdffigures2
            ~/.cache/coursier
            ~/.ivy2/cache
            ~/.sbt
          key: ${{ runner.os }}-dpr-embed-deps-v1-${{ hashFiles('requirements.txt') }}

      - name: Install deps (skip sqlite3)
        if: env.SHOULD_RUN == 'true'
        run: |
          python - <<'PY'
          import re
          lines = open("requirements.txt", "r", encoding="utf-8").read().splitlines()
          lines = [l for l in lines if l.strip() and not re.match(r"^sqlite3\\b", l)]
          open("/tmp/req.txt", "w", encoding="utf-8").write("\n".join(lines))
          PY
          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system -r /tmp/req.txt

      - name: Prepare pdffigures2
        if: env.SHOULD_RUN == 'true'
        run: |
          set -euo pipefail

          TOOL_DIR="$HOME/.cache/dpr-tools/pdffigures2"
          SRC_DIR="$TOOL_DIR/src"
          JAR_PATH="$TOOL_DIR/pdffigures2.jar"

          mkdir -p "$TOOL_DIR"
          if [ ! -f "$JAR_PATH" ]; then
            rm -rf "$SRC_DIR"
            git clone --depth 1 https://github.com/allenai/pdffigures2 "$SRC_DIR"
            cd "$SRC_DIR"
            curl -fsSL -o sbt.tgz https://github.com/sbt/sbt/releases/download/v1.10.1/sbt-1.10.1.tgz
            tar -xzf sbt.tgz
            ./sbt/bin/sbt assembly
            cp pdffigures2.jar "$JAR_PATH"
          fi

          echo "PDFFIGURES2_JAR=$JAR_PATH" >> "$GITHUB_ENV"

      - name: Run Retrieval and Embedding
        if: env.SHOULD_RUN == 'true'
        env:
          HF_HOME: ${{ github.workspace }}/hf_cache
          HUGGINGFACE_HUB_CACHE: ${{ github.workspace }}/hf_cache
          HF_HUB_DISABLE_SYMLINKS: "1"
        run: |
          echo "Cleaning any previous local cache..."
          rm -rf ${{ github.workspace }}/hf_cache

          echo "=== Debug: runtime env ==="
          echo "PWD=$(pwd)"
          echo "HOME=$HOME"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "HF_HOME=$HF_HOME"
          echo "HUGGINGFACE_HUB_CACHE=$HUGGINGFACE_HUB_CACHE"
          echo "HF_HUB_DISABLE_SYMLINKS=$HF_HUB_DISABLE_SYMLINKS"
          echo "TRANSFORMERS_CACHE=${TRANSFORMERS_CACHE:-<unset>}"
          echo "XDG_CACHE_HOME=${XDG_CACHE_HOME:-<unset>}"
          echo "--- env (filtered) ---"
          env | grep -E '^(HF_|HUGGINGFACE_|TRANSFORMERS_|XDG_|HOME=|GITHUB_WORKSPACE=)' | sort || true

          echo "--- python/hf versions ---"
          python - <<'PY'
          import os
          def v(mod):
            try:
              m = __import__(mod)
              return getattr(m, "__version__", "<no __version__>")
            except Exception as e:
              return f"<import failed: {e}>"

          print("python_exe:", os.environ.get("PYTHON", ""))
          print("HF_HOME env:", os.environ.get("HF_HOME"))
          print("HUGGINGFACE_HUB_CACHE env:", os.environ.get("HUGGINGFACE_HUB_CACHE"))
          print("HF_HUB_DISABLE_SYMLINKS env:", os.environ.get("HF_HUB_DISABLE_SYMLINKS"))
          print("TRANSFORMERS_CACHE env:", os.environ.get("TRANSFORMERS_CACHE"))
          print("versions:", {
            "huggingface_hub": v("huggingface_hub"),
            "transformers": v("transformers"),
            "sentence_transformers": v("sentence_transformers"),
          })
          try:
            from huggingface_hub import constants as c
            print("hub.constants:", {
              "HF_HOME": getattr(c, "HF_HOME", None),
              "HUGGINGFACE_HUB_CACHE": getattr(c, "HUGGINGFACE_HUB_CACHE", None),
              "HF_HUB_DISABLE_SYMLINKS": getattr(c, "HF_HUB_DISABLE_SYMLINKS", None),
            })
          except Exception as e:
            print("hub.constants import failed:", e)
          PY

          echo "--- cache dir check ---"
          echo "[legacy] ~/.cache/huggingface:"
          ls -la ~/.cache/huggingface || true
          echo "[current] $HF_HOME:"
          ls -la "$HF_HOME" || true

          echo "Running main script..."
          RUN_ENRICH="${{ github.event.inputs.run_enrich }}"
          FETCH_DAYS="${{ github.event.inputs.fetch_days }}"
          FETCH_MODE="${{ github.event.inputs.fetch_mode }}"
          PROFILE_TAG="${{ github.event.inputs.profile_tag }}"
          RUN_DATE_TOKEN="${{ github.event.inputs.run_date_token }}"
          RECALL_TOP_K="${{ github.event.inputs.recall_top_k }}"
          RRF_TOP_N="${{ github.event.inputs.rrf_top_n }}"
          SKIP_LLM_REFINE="${{ github.event.inputs.skip_llm_refine }}"
          FORCE_DEEP="${{ github.event.inputs.force_deep }}"
          if [ -z "$RUN_ENRICH" ]; then
            RUN_ENRICH="false"
          fi
          if [ -z "$FETCH_DAYS" ]; then
            FETCH_DAYS="1"
          fi
          if [ -z "$FETCH_MODE" ]; then
            FETCH_MODE="standard"
          fi
          if [ -z "$PROFILE_TAG" ]; then
            PROFILE_TAG="${{ matrix.profile_tag }}"
          fi
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ -z "$RECALL_TOP_K" ]; then
              RECALL_TOP_K="30"
            fi
            if [ -z "$RRF_TOP_N" ]; then
              RRF_TOP_N="60"
            fi
            if [ -z "$SKIP_LLM_REFINE" ]; then
              SKIP_LLM_REFINE="true"
            fi
          fi
          if [ -z "$FORCE_DEEP" ]; then
            FORCE_DEEP="false"
          fi
          METADATA_ONLY_DOCS="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$RUN_DATE_TOKEN" ] && [ "$SKIP_LLM_REFINE" = "true" ] && [ "$FORCE_DEEP" = "true" ]; then
            METADATA_ONLY_DOCS="true"
          fi
          echo "Resolved inputs: run_enrich=${RUN_ENRICH}, fetch_days=${FETCH_DAYS}, fetch_mode=${FETCH_MODE}, profile_tag=${PROFILE_TAG}, run_date_token=${RUN_DATE_TOKEN}, recall_top_k=${RECALL_TOP_K}, rrf_top_n=${RRF_TOP_N}, skip_llm_refine=${SKIP_LLM_REFINE}, force_deep=${FORCE_DEEP}, metadata_only_docs=${METADATA_ONLY_DOCS}"
          ARGS=()
          if [ "$RUN_ENRICH" = "true" ]; then
            ARGS+=(--run-enrich)
          fi
          if [ -n "$FETCH_DAYS" ]; then
            ARGS+=(--fetch-days "$FETCH_DAYS")
          fi
          if [ -n "$FETCH_MODE" ]; then
            ARGS+=(--fetch-mode "$FETCH_MODE")
          fi
          if [ -n "$PROFILE_TAG" ]; then
            ARGS+=(--profile-tag "$PROFILE_TAG")
          fi
          if [ -n "$RUN_DATE_TOKEN" ]; then
            ARGS+=(--run-date-token "$RUN_DATE_TOKEN")
          fi
          if [ -n "$RECALL_TOP_K" ]; then
            ARGS+=(--recall-top-k "$RECALL_TOP_K")
          fi
          if [ -n "$RRF_TOP_N" ]; then
            ARGS+=(--rrf-top-n "$RRF_TOP_N")
          fi
          if [ "$SKIP_LLM_REFINE" = "true" ]; then
            ARGS+=(--skip-llm-refine)
          fi
          if [ "$FORCE_DEEP" = "true" ]; then
            ARGS+=(--force-deep)
          fi
          if [ "$METADATA_ONLY_DOCS" = "true" ]; then
            ARGS+=(--metadata-only-docs)
          fi
          ARGS+=(--llm-batch-size 6 --llm-filter-concurrency 2)
          python src/main.py "${ARGS[@]}" --embedding-device cpu --embedding-batch-size 8

          # Copy config for frontend read-only access without a GitHub token.
          cp -f config.yaml docs/config.yaml

          echo "--- post-run cache symlink check ---"
          find "$HF_HOME" -xtype l | head -n 50 || true

      - name: Cleanup non-recommend archives
        if: env.SHOULD_RUN == 'true'
        run: |
          find archive -mindepth 2 -maxdepth 2 -type d \( -name raw -o -name filtered -o -name rank \) -exec rm -rf {} +

      - name: Commit results
        if: env.SHOULD_RUN == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="${GITHUB_REF_NAME:-main}"

          shopt -s nullglob
          paths=(docs config.yaml)
          if [ -f archive/arxiv_seen.json ]; then
            paths+=(archive/arxiv_seen.json)
          fi
          if [ -f archive/crawl_state.json ]; then
            paths+=(archive/crawl_state.json)
          fi
          if [ -f archive/carryover.json ]; then
            paths+=(archive/carryover.json)
          fi
          for d in archive/*/recommend; do
            paths+=("$d")
          done

          git add "${paths[@]}"
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "[chore] daily pipeline"

          git fetch origin "$branch"
          git rebase -X theirs "origin/$branch"
          git push origin HEAD:"$branch"
