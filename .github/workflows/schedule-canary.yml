name: schedule-canary

on:
  schedule:
    - cron: "57 10 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - name: Print trigger
        run: |
          echo "event=${{ github.event_name }}"
          echo "sha=${{ github.sha }}"
          date -u
