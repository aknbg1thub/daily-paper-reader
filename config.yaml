github:
  owner: aknbg1thub
  repo: daily-paper-reader
arxiv_paper_setting:
  mode: standard
  days_window: 9
  docs_dir: docs
  prefer_supabase_read: true
supabase:
  enabled: true
  url: https://lyucdwgefyfbmaiopjbk.supabase.co
  anon_key: sb_publishable_lX-oi64Uxyd7SIVv3_w2Uw_MTOojeKq
  papers_table: arxiv_papers
  use_vector_rpc: true
  vector_rpc: match_arxiv_papers
  vector_rpc_ann: match_arxiv_papers
  vector_rpc_exact: match_arxiv_papers_exact
  use_bm25_rpc: true
  bm25_rpc: match_arxiv_papers_bm25
  sync_table: arxiv_sync_status
  sync_success_value: success
  schema: public
subscriptions:
  schema_migration:
    stage: A
    diff_threshold_pct: 15
  keyword_recall_mode: or
  intent_profiles:
  - tag: QC-GENERAL
    description: 量子计算通用入口，覆盖量子硬件、量子算法、量子控制、量子纠错和系统软件，作为宽召回基线。
    enabled: true
    paper_sources:
    - arxiv
    keywords:
    - keyword: quantum computing
      keyword_cn: 量子计算
      query: quantum computing hardware algorithms control error correction and systems
    - keyword: quantum processor
      keyword_cn: 量子处理器
      query: quantum processor architecture control calibration and benchmarking
    - keyword: quantum computer
      keyword_cn: 量子计算机
      query: quantum computer implementation architecture and performance
    intent_queries:
    - query: recent papers broadly related to quantum computing, quantum processors, quantum control, quantum simulation, and quantum error correction
      query_cn: 量子计算、量子处理器、量子控制、量子仿真和量子纠错相关论文
      enabled: true
      source: manual
      note: broad recall baseline
  - tag: SC-QUBIT-CHIP
    description: 超导量子芯片设计相关：transmon、fluxonium、耦合器、读出、封装、串扰、频率分配和可扩展处理器架构。
    enabled: true
    paper_sources:
    - arxiv
    keywords:
    - keyword: superconducting quantum chip
      keyword_cn: 超导量子芯片
      query: superconducting quantum chip design scalable processor architecture
    - keyword: superconducting qubit
      keyword_cn: 超导量子比特
      query: superconducting qubit transmon fluxonium tunable coupler readout coherence
    - keyword: microwave packaging
      keyword_cn: 微波封装
      query: microwave packaging interconnect crosstalk and signal integrity for superconducting qubits
    intent_queries:
    - query: superconducting quantum chip design with transmon qubits, tunable couplers, readout resonators, crosstalk mitigation, microwave packaging, and flip-chip processors
      query_cn: 超导量子芯片设计、transmon、可调耦合器、读出谐振器、串扰抑制、微波封装和倒装芯片处理器
      enabled: true
      source: manual
      note: ''
  - tag: TOPO-LAYOUT
    description: 拓扑层：超导/量子芯片布局布线、连接拓扑、频率分配、控制线/读出线规划和EDA算法。
    enabled: true
    paper_sources:
    - arxiv
    keywords:
    - keyword: quantum chip layout
      keyword_cn: 量子芯片布局
      query: quantum chip layout placement routing topology optimization
    - keyword: superconducting qubit routing
      keyword_cn: 超导量子比特布线
      query: superconducting qubit layout routing frequency allocation crosstalk
    - keyword: quantum EDA
      keyword_cn: 量子EDA
      query: quantum EDA algorithms for layout routing compilation and hardware mapping
    intent_queries:
    - query: layout routing topology synthesis frequency allocation and EDA algorithms for superconducting quantum chips and quantum processors
      query_cn: 面向超导量子芯片和量子处理器的布局布线、拓扑综合、频率分配和EDA算法
      enabled: true
      source: manual
      note: ''
  - tag: EQ-CIRCUIT
    description: 等效电路层：电路构建、参数提取、黑盒量化、电容/电感矩阵、EPR、哈密顿量构建与求解。
    enabled: true
    paper_sources:
    - arxiv
    keywords:
    - keyword: equivalent circuit
      keyword_cn: 等效电路
      query: equivalent circuit extraction superconducting quantum circuits
    - keyword: black-box quantization
      keyword_cn: 黑盒量化
      query: black-box quantization capacitance matrix inductance matrix Josephson circuits
    - keyword: Hamiltonian diagonalization
      keyword_cn: 哈密顿量对角化
      query: Hamiltonian construction diagonalization effective Hamiltonian superconducting qubits
    intent_queries:
    - query: equivalent circuit construction parameter extraction capacitance matrix inductance matrix energy participation ratio black-box quantization Hamiltonian construction and diagonalization for superconducting qubits
      query_cn: 超导量子比特的等效电路构建、参数提取、电容矩阵、电感矩阵、能量参与率、黑盒量化、哈密顿量构建与对角化
      enabled: true
      source: manual
      note: ''
  - tag: SIM-ACCEL
    description: 仿真层：量子系统数值仿真、脉冲级仿真、开放系统动力学、哈密顿量求解加速和高性能计算方法。
    enabled: true
    paper_sources:
    - arxiv
    keywords:
    - keyword: quantum simulation acceleration
      keyword_cn: 量子仿真加速
      query: accelerated simulation of quantum systems Hamiltonian solvers GPU sparse methods
    - keyword: pulse-level simulation
      keyword_cn: 脉冲级仿真
      query: pulse-level simulation superconducting qubits open quantum systems
    - keyword: Hamiltonian solver
      keyword_cn: 哈密顿量求解器
      query: Hamiltonian eigensolver time evolution solver quantum many-body sparse simulation
    intent_queries:
    - query: methods that accelerate simulation of superconducting qubits quantum circuits Hamiltonian dynamics open quantum systems pulse-level models and many-body solvers
      query_cn: 加速超导量子比特、量子电路、哈密顿量动力学、开放量子系统、脉冲级模型和多体求解的仿真方法
      enabled: true
      source: manual
      note: ''
  - tag: CO-OPT
    description: 协同优化：芯片架构、布局、频率、控制脉冲、编译映射、校准和误差缓解的跨层联合优化。
    enabled: true
    paper_sources:
    - arxiv
    keywords:
    - keyword: cross-layer optimization
      keyword_cn: 跨层优化
      query: cross-layer optimization quantum hardware compiler control calibration
    - keyword: hardware software co-design
      keyword_cn: 软硬协同设计
      query: hardware software co-design quantum processors superconducting qubits
    - keyword: co-optimization
      keyword_cn: 协同优化
      query: co-optimization layout control pulses calibration compilation quantum chips
    intent_queries:
    - query: cross-layer co-optimization of superconducting quantum chip architecture layout routing frequencies pulse control calibration compilation and error mitigation
      query_cn: 超导量子芯片架构、布局布线、频率、脉冲控制、校准、编译和误差缓解的跨层协同优化
      enabled: true
      source: manual
      note: ''
  - tag: AI-SCQC-DESIGN
    description: AI赋能超导量子芯片设计：机器学习、强化学习、贝叶斯优化、代理模型、自动校准和数据驱动设计。
    enabled: true
    paper_sources:
    - arxiv
    keywords:
    - keyword: machine learning superconducting qubits
      keyword_cn: 机器学习超导量子比特
      query: machine learning for superconducting qubit design calibration and control
    - keyword: AI quantum chip design
      keyword_cn: AI量子芯片设计
      query: AI assisted quantum chip design surrogate models Bayesian optimization reinforcement learning
    - keyword: data-driven Hamiltonian
      keyword_cn: 数据驱动哈密顿量
      query: data-driven Hamiltonian learning model reduction superconducting qubits
    intent_queries:
    - query: AI machine learning reinforcement learning Bayesian optimization surrogate modeling and data-driven methods for superconducting quantum chip design Hamiltonian learning calibration and control
      query_cn: 用于超导量子芯片设计、哈密顿量学习、校准和控制的AI、机器学习、强化学习、贝叶斯优化、代理模型和数据驱动方法
      enabled: true
      source: manual
      note: ''
